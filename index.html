<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ezza Ledger XOS Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input:focus { outline: none; }
        .smooth-transition { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .custom-scroll { -webkit-overflow-scrolling: touch; scroll-behavior: smooth; }
        .custom-scroll::-webkit-scrollbar { width: 0px; }
        input[type="date"]::-webkit-calendar-picker-indicator {
            position: absolute; inset: 0; width: 100%; height: 100%; margin: 0; padding: 0; cursor: pointer; opacity: 0;
        }
        .swipe-item { transform: translateX(0px); transition: transform 0.15s ease-out; will-change: transform; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 font-sans antialiased text-slate-900 dark:text-slate-100 flex flex-col h-screen w-full max-w-xl mx-auto overflow-hidden smooth-transition">

    <!-- TAB 1: ACCOUNTS LEDGER VIEW -->
    <div id="view-accounts" class="flex flex-col flex-1 min-h-0">
        <!-- TOP HEADER SECTION -->
        <header class="bg-white dark:bg-slate-900 px-4 pt-4 pb-3 sticky top-0 z-10 shadow-sm border-b border-slate-100 dark:border-slate-800/60 rounded-b-2xl space-y-2.5">
            <div class="flex items-center justify-between">
                <div class="flex flex-col">
                    <span class="text-[10px] font-bold tracking-widest uppercase text-slate-400 dark:text-slate-500">Net Ledger Balance</span>
                    <div class="text-2xl font-black tracking-tight text-cyan-600 dark:text-cyan-400 flex items-baseline gap-1 font-mono mt-0.5">
                        <span class="text-xs font-bold tracking-normal text-cyan-500/70">Rs.</span>
                        <span id="total-amount">0</span>
                    </div>
                </div>
                
                <div class="flex items-center gap-1.5">
                    <button onclick="shareReceiptNative()" title="Share Receipt Instantly" class="bg-cyan-50 dark:bg-cyan-950/40 p-2 rounded-xl border border-cyan-200/40 dark:border-cyan-800 transition text-cyan-600 dark:text-cyan-400 active:scale-95 flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" /></svg>
                    </button>
                    <div class="relative bg-slate-50 dark:bg-slate-950 px-2.5 py-1.5 rounded-xl border border-slate-200/60 dark:border-slate-800 flex items-center gap-1">
                        <select id="ledger-selector" onchange="switchLedger()" class="bg-transparent text-xs font-bold text-slate-700 dark:text-slate-300 pr-4 cursor-pointer focus:outline-none appearance-none z-10"></select>
                        <span class="absolute right-2 pointer-events-none text-[9px] text-slate-400">▼</span>
                    </div>
                </div>
            </div>

            <!-- PREVIOUS ARREARS ACCOUNT SLAT -->
            <div class="flex items-center justify-between bg-amber-50/40 dark:bg-amber-950/10 border border-amber-100/40 dark:border-amber-900/20 rounded-xl px-3 py-1.5 text-xs">
                <span class="font-bold text-amber-800/80 dark:text-amber-400/80 text-[10px] uppercase tracking-wider">Previous Arrears Balance</span>
                <div class="flex items-center gap-1 font-mono font-bold text-amber-900 dark:text-amber-300">
                    <span class="text-[10px] text-amber-600/60">Rs.</span>
                    <input type="number" id="previous-arrears" value="0" oninput="handleLedgerInputSync()" class="w-20 bg-transparent text-right font-bold text-slate-800 dark:text-slate-100" placeholder="0" />
                </div>
            </div>

            <!-- UTILITY ACTIONS FOR LEDGER CONTROLS -->
            <div class="flex items-center justify-between gap-2 text-[10px] font-bold">
                <span id="ledger-title-display" class="text-slate-400 dark:text-slate-500 truncate max-w-[180px]">Book: Default</span>
                <div class="flex gap-2 shrink-0">
                    <button onclick="createNewLedger()" class="text-cyan-600 dark:text-cyan-400 hover:opacity-80 transition">+ New Book</button>
                    <span class="text-slate-200 dark:text-slate-800">|</span>
                    <button onclick="deleteCurrentLedger()" class="text-rose-500 hover:opacity-80 transition">Delete Current</button>
                </div>
            </div>
        </header>

        <!-- MAIN SCROLL CANVAS -->
        <main class="flex-1 p-3 flex flex-col min-h-0 overflow-hidden">
            <div id="ledger-container" class="flex-1 overflow-y-auto space-y-0 border border-slate-100 dark:border-slate-800/40 rounded-2xl bg-white dark:bg-slate-900 custom-scroll divide-y divide-slate-100 dark:divide-slate-800/40"></div>
            <button onclick="addNewRow('', null, 'EXPENSE', true)" class="mt-2.5 py-3 bg-cyan-600 dark:bg-cyan-700 text-white text-xs font-bold tracking-widest uppercase rounded-xl shadow-md shadow-cyan-600/10 hover:bg-cyan-500 dark:hover:bg-cyan-600 transition active:scale-[0.98] flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" /></svg>
                Add Row Line
            </button>
        </main>
    </div>

    <!-- TAB 2: SALARY EXPENSE TRACKER VIEW -->
    <div id="view-salary" class="hidden flex flex-col flex-1 min-h-0">
        <!-- SALARY CONTROLLER PANEL -->
        <header class="bg-white dark:bg-slate-900 px-4 pt-4 pb-3 sticky top-0 z-10 shadow-sm border-b border-slate-100 dark:border-slate-800/60 rounded-b-2xl space-y-2.5">
            <div class="flex items-center justify-between">
                <div>
                    <span class="text-[10px] font-bold tracking-widest uppercase text-slate-400 dark:text-slate-500">Remaining Wallet Balance</span>
                    <div class="text-2xl font-black tracking-tight text-fuchsia-600 dark:text-fuchsia-400 flex items-baseline gap-1 font-mono mt-0.5">
                        <span class="text-xs font-bold tracking-normal text-fuchsia-500/70">Rs.</span>
                        <span id="salary-remaining-amount">0</span>
                    </div>
                </div>
                
                <div class="flex items-center gap-1.5">
                    <button onclick="shareReceiptNative()" title="Share Receipt Instantly" class="bg-fuchsia-50 dark:bg-fuchsia-950/40 p-2 rounded-xl border border-fuchsia-200/40 dark:border-fuchsia-800 transition text-fuchsia-600 dark:text-fuchsia-400 active:scale-95 flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" /></svg>
                    </button>
                    <div class="bg-slate-50 dark:bg-slate-950 border border-slate-200/60 dark:border-slate-800 rounded-xl px-2.5 flex items-center justify-between relative">
                        <select id="salary-month-selector" onchange="switchSalaryMonth()" class="bg-transparent text-xs font-bold text-slate-700 dark:text-slate-300 pr-4 cursor-pointer focus:outline-none appearance-none z-10 py-2"></select>
                        <span class="absolute right-2 pointer-events-none text-[9px] text-slate-400">▼</span>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1">
                <div class="bg-fuchsia-50/30 dark:bg-fuchsia-950/10 border border-fuchsia-100/40 dark:border-fuchsia-900/20 rounded-xl px-3 py-1.5 flex flex-col justify-center">
                    <span class="text-[9px] font-bold uppercase tracking-wider text-fuchsia-500 dark:text-fuchsia-400">Base Salary Income Target</span>
                    <div class="flex items-center gap-0.5 font-mono font-bold text-slate-800 dark:text-slate-100">
                        <span class="text-xs text-fuchsia-400/70">Rs.</span>
                        <input type="number" id="salary-base-income" value="100000" oninput="handleSalaryInputSync()" class="bg-transparent text-sm font-bold w-full focus:outline-none" />
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-between text-[10px] font-bold">
                <span class="text-slate-400 dark:text-slate-500 tracking-wide">Deductions Ledger</span>
                <button onclick="createNewSalaryMonth()" class="text-fuchsia-600 dark:text-fuchsia-400 hover:opacity-80 transition">+ Create Cycle</button>
            </div>
        </header>

        <!-- EXPENSE LOG LIST -->
        <main class="flex-1 p-3 flex flex-col min-h-0 overflow-hidden">
            <div id="salary-expenses-container" class="flex-1 overflow-y-auto space-y-0 border border-slate-100 dark:border-slate-800/40 rounded-2xl bg-white dark:bg-slate-900 custom-scroll divide-y divide-slate-100 dark:divide-slate-800/40"></div>
            <button onclick="addNewSalaryExpenseRow('', null, 'EXPENSE', true)" class="mt-2.5 py-3 bg-fuchsia-600 dark:bg-fuchsia-700 text-white text-xs font-bold tracking-widest uppercase rounded-xl shadow-md shadow-fuchsia-600/10 hover:bg-fuchsia-500 dark:hover:bg-fuchsia-600 transition active:scale-[0.98] flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" /></svg>
                Add Expense Line
            </button>
        </main>
    </div>

    <!-- PERSISTENT FOOTER UTILITIES INTERFACE -->
    <footer class="px-4 pt-2 pb-4 bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800/80 flex flex-col gap-2 rounded-t-2xl shadow-xl">
        <div class="grid grid-cols-2 gap-1.5 bg-slate-100 dark:bg-slate-950 p-1 rounded-xl border border-slate-200/40 dark:border-slate-900">
            <button id="btn-nav-accounts" onclick="switchViewTab('accounts')" class="py-2 text-xs font-black rounded-lg uppercase tracking-wider transition smooth-transition bg-white dark:bg-slate-900 text-cyan-600 dark:text-cyan-400 shadow-sm border border-slate-200/10">📁 Ledger Books</button>
            <button id="btn-nav-salary" onclick="switchViewTab('salary')" class="py-2 text-xs font-black rounded-lg uppercase tracking-wider transition smooth-transition text-slate-400 dark:text-slate-500">💼 Salary Wallet</button>
        </div>

        <div id="global-utility-buttons" class="flex items-center gap-2 text-[10px] font-bold text-slate-400 dark:text-slate-500 px-1 justify-between">
            <input type="file" id="import-file-input" accept=".json" class="hidden" onchange="importBackup(event)">
            <button onclick="clearActiveTabRows()" class="hover:text-rose-500 transition">Clear Current</button>
            <div class="flex gap-2.5">
                <button onclick="copyRawBackupStringToClipboard()" class="hover:text-slate-600 dark:hover:text-slate-300 transition">Copy Back Code</button>
                <button onclick="exportBackup()" class="hover:text-slate-600 dark:hover:text-slate-300 transition">Export JSON</button>
                <button onclick="document.getElementById('import-file-input').click()" class="hover:text-slate-600 dark:hover:text-slate-300 transition">Import JSON</button>
            </div>
        </div>
    </footer>

    <script>
        const ledgerContainer = document.getElementById('ledger-container');
        const totalAmountDisplay = document.getElementById('total-amount');
        const arrearsInput = document.getElementById('previous-arrears');
        const ledgerSelector = document.getElementById('ledger-selector');
        const ledgerTitleDisplay = document.getElementById('ledger-title-display');

        const salaryExpensesContainer = document.getElementById('salary-expenses-container');
        const salaryRemainingDisplay = document.getElementById('salary-remaining-amount');
        const salaryBaseIncomeInput = document.getElementById('salary-base-income');
        const salaryMonthSelector = document.getElementById('salary-month-selector');

        let activeTab = 'accounts';

        let masterKhataData = {
            activeLedger: "June 2026 Ledger",
            ledgers: {
                "June 2026 Ledger": { arrears: 0, rows: [] }
            },
            salaryTracker: {
                activeMonth: "June 2026",
                months: {
                    "June 2026": { income: 100000, expenses: [] }
                }
            }
        };

        const categoryKeywordDict = {
            '🍔 Food': ['milk', 'bread', 'food', 'meat', 'chicken', 'hotel', 'dinner', 'lunch', 'fruit', 'vegetable', 'sabzi'],
            '⚡ Bills': ['bill', 'electricity', 'wapda', 'gas', 'internet', 'wi-fi', 'mobile', 'load', 'recharge'],
            '⛽ Fuel': ['fuel', 'petrol', 'bike', 'car', 'cng', 'diesel', 'travel'],
            '🏢 Office': ['stationary', 'laptop', 'repair', 'maintenance', 'ink', 'paper', 'office']
        };

        function getAutoCategoryTag(text) {
            const normalized = text.toLowerCase();
            for (const [tag, keywords] of Object.entries(categoryKeywordDict)) {
                if (keywords.some(kw => normalized.includes(kw))) return tag;
            }
            return '📦 Misc';
        }

        function initThemeEngine() {
            if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.classList.add('dark');
            }
        }

        function getRawIsoDateString() {
            const tzoffset = (new Date()).getTimezoneOffset() * 60000;
            return (new Date(Date.now() - tzoffset)).toISOString().split('T')[0];
        }

        function formatIsoToBadgeText(isoString) {
            if (!isoString) return '';
            const parts = isoString.split('-');
            if (parts.length !== 3) return isoString;
            const dateObj = new Date(parts[0], parts[1] - 1, parts[2]);
            return dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        function updateUiDateDisplay(dateInputNode) {
            const container = dateInputNode.parentElement;
            const labelNode = container.querySelector('.date-label');
            if (labelNode) labelNode.innerText = formatIsoToBadgeText(dateInputNode.value);
            activeTab === 'accounts' ? handleLedgerInputSync() : handleSalaryInputSync();
        }

        function parseEvaluatedExpressionValue(textStr) {
            const numbers = textStr.match(/[+-]?\d+(?:\.\d+)?/g);
            let sum = 0;
            if (numbers) numbers.forEach(n => sum += parseFloat(n));
            return sum;
        }

        function updateInlineRowEvaluationBadge(inputNode, sumValue) {
            let container = inputNode.parentElement.querySelector('.badge-holder-zone');
            if(!container) return;
            container.innerHTML = '';
            
            if(inputNode.value.trim() !== '') {
                const tag = getAutoCategoryTag(inputNode.value);
                const tagBadge = document.createElement('span');
                tagBadge.className = 'text-[9px] font-bold bg-slate-100 dark:bg-slate-800 text-slate-400 dark:text-slate-500 px-1 py-0.5 rounded';
                tagBadge.innerText = tag;
                container.appendChild(tagBadge);
            }

            if (sumValue !== 0 && (inputNode.value.includes('+') || inputNode.value.includes('-'))) {
                const evalBadge = document.createElement('span');
                const themeColor = activeTab === 'accounts' ? 'text-cyan-600 dark:text-cyan-400 bg-cyan-50 dark:bg-cyan-950/40 border-cyan-100 dark:border-cyan-900/30' : 'text-fuchsia-600 dark:text-fuchsia-400 bg-fuchsia-50 dark:bg-fuchsia-950/40 border-fuchsia-100 dark:border-fuchsia-900/30';
                evalBadge.className = `text-[9px] font-mono font-bold px-1 py-0.5 rounded cursor-pointer border ${themeColor}`;
                evalBadge.innerText = `∑ ${sumValue}`;
                evalBadge.onclick = function(e) {
                    e.stopPropagation();
                    const words = inputNode.value.replace(/[0-9.+\s-]/g, '').trim();
                    inputNode.value = words ? `${words} ${sumValue}` : sumValue;
                    updateInlineRowEvaluationBadge(inputNode, sumValue);
                    activeTab === 'accounts' ? handleLedgerInputSync() : handleSalaryInputSync();
                };
                container.appendChild(evalBadge);
            }
        }

        function attachTouchSwipeGestures(rowElement) {
            let startX = 0;
            let currentX = 0;
            const threshold = -70; 

            rowElement.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
            }, { passive: true });

            rowElement.addEventListener('touchmove', (e) => {
                currentX = e.touches[0].clientX - startX;
                if (currentX < 0 && currentX > -100) {
                    rowElement.style.transform = `translateX(${currentX}px)`;
                }
            }, { passive: true });

            rowElement.addEventListener('touchend', () => {
                rowElement.style.transform = '';
                if (currentX < threshold) {
                    rowElement.style.opacity = '0';
                    setTimeout(() => {
                        rowElement.remove();
                        activeTab === 'accounts' ? handleLedgerInputSync() : handleSalaryInputSync();
                    }, 150);
                }
                currentX = 0;
            });
        }

        function switchViewTab(targetTab) {
            if(activeTab === targetTab) return;
            activeTab = targetTab;
            
            const viewAcc = document.getElementById('view-accounts');
            const viewSal = document.getElementById('view-salary');
            const btnAcc = document.getElementById('btn-nav-accounts');
            const btnSal = document.getElementById('btn-nav-salary');

            if (targetTab === 'accounts') {
                viewAcc.classList.remove('hidden');
                viewSal.classList.add('hidden');
                btnAcc.className = "py-2 text-xs font-black rounded-lg uppercase tracking-wider transition smooth-transition bg-white dark:bg-slate-900 text-cyan-600 dark:text-cyan-400 shadow-sm border border-slate-200/10";
                btnSal.className = "py-2 text-xs font-black rounded-lg uppercase tracking-wider transition smooth-transition text-slate-400 dark:text-slate-500";
                renderActiveLedgerRows();
            } else {
                viewAcc.classList.add('hidden');
                viewSal.classList.remove('hidden');
                btnAcc.className = "py-2 text-xs font-black rounded-lg uppercase tracking-wider transition smooth-transition text-slate-400 dark:text-slate-500";
                btnSal.className = "py-2 text-xs font-black rounded-lg uppercase tracking-wider transition smooth-transition bg-white dark:bg-slate-900 text-fuchsia-600 dark:text-fuchsia-400 shadow-sm border border-slate-200/10";
                renderActiveSalaryMonthRows();
            }
        }

        function addNewRow(initialValue = '', savedIsoDate = null, transactionType = 'EXPENSE', focusTarget = false) {
            const finalIsoDate = savedIsoDate || getRawIsoDateString();
            const rowDiv = document.createElement('div');
            rowDiv.className = 'swipe-item flex flex-col bg-white dark:bg-slate-900 px-3 py-1.5 smooth-transition focus-within:bg-slate-50/70 dark:focus-within:bg-slate-800/30 relative';
            rowDiv.dataset.type = transactionType;

            const activeColorClass = transactionType === 'INCOME' ? 'bg-cyan-500 text-white' : 'bg-slate-200 dark:bg-slate-800 text-slate-600 dark:text-slate-400';
            
            rowDiv.innerHTML = `
                <div class="flex items-center gap-2 w-full">
                    <button onclick="toggleTransactionRowType(this)" class="tx-toggle-btn text-[9px] font-black tracking-wider px-1 py-0.5 rounded uppercase shrink-0 transition ${activeColorClass}">${transactionType}</button>
                    <div class="relative bg-slate-50 dark:bg-slate-950 rounded px-1.5 py-0.5 text-center min-w-[58px] max-w-[58px] overflow-hidden shrink-0 border border-slate-100 dark:border-slate-800/80">
                        <input type="date" value="${finalIsoDate}" class="row-date-picker absolute inset-0 opacity-0 cursor-pointer w-full h-full" onchange="updateUiDateDisplay(this)" />
                        <span class="date-label text-[9px] font-bold text-slate-500 dark:text-slate-400 tracking-tight block pointer-events-none">${formatIsoToBadgeText(finalIsoDate)}</span>
                    </div>
                    <input type="text" value="${initialValue}" class="ledger-input flex-1 bg-transparent text-sm font-semibold text-slate-800 dark:text-slate-200 placeholder-slate-300 dark:placeholder-slate-600 py-0.5" placeholder="Milk 450 + bread 120" autocomplete="off" autocorrect="off" autocapitalize="off" />
                    <div class="badge-holder-zone flex items-center gap-1 shrink-0 select-none"></div>
                </div>
            `;

            ledgerContainer.appendChild(rowDiv);
            attachTouchSwipeGestures(rowDiv);
            const inputElement = rowDiv.querySelector('.ledger-input');
            
            updateInlineRowEvaluationBadge(inputElement, parseEvaluatedExpressionValue(initialValue));

            inputElement.addEventListener('input', function() {
                updateInlineRowEvaluationBadge(this, parseEvaluatedExpressionValue(this.value));
                handleLedgerInputSync();
            });
            
            inputElement.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const nextInput = addNewRow('', null, 'EXPENSE', true);
                    nextInput.focus();
                }
            });

            if (focusTarget) {
                setTimeout(() => {
                    inputElement.focus();
                    rowDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }, 40);
            }
            return inputElement;
        }

        function toggleTransactionRowType(buttonNode) {
            const container = buttonNode.parentElement.parentElement;
            const currentType = container.dataset.type || 'EXPENSE';
            const nextType = currentType === 'EXPENSE' ? 'INCOME' : 'EXPENSE';
            container.dataset.type = nextType;
            buttonNode.innerText = nextType;
            
            if(nextType === 'INCOME') {
                const badgeColor = activeTab === 'accounts' ? 'bg-cyan-500' : 'bg-fuchsia-500';
                buttonNode.className = `tx-toggle-btn text-[9px] font-black tracking-wider px-1 py-0.5 rounded uppercase shrink-0 transition text-white ${badgeColor}`;
            } else {
                buttonNode.className = "tx-toggle-btn text-[9px] font-black tracking-wider px-1 py-0.5 rounded uppercase shrink-0 transition bg-slate-200 dark:bg-slate-800 text-slate-600 dark:text-slate-400";
            }
            activeTab === 'accounts' ? handleLedgerInputSync() : handleSalaryInputSync();
        }

        function handleLedgerInputSync() {
            let grandTotal = 0;
            const rows = ledgerContainer.querySelectorAll(':scope > div');
            const dataArray = [];

            rows.forEach(row => {
                const dateVal = row.querySelector('.row-date-picker').value;
                const textVal = row.querySelector('.ledger-input').value;
                const type = row.dataset.type || 'EXPENSE';
                const rowAmt = parseEvaluatedExpressionValue(textVal);

                if(type === 'INCOME') grandTotal -= rowAmt;
                else grandTotal += rowAmt;

                if (textVal.trim() !== '') {
                    dataArray.push({ isoDate: dateVal, textVal, type });
                }
            });

            const arrearsVal = parseFloat(arrearsInput.value) || 0;
            grandTotal += arrearsVal;
            totalAmountDisplay.innerText = grandTotal.toLocaleString('en-US');

            masterKhataData.ledgers[masterKhataData.activeLedger] = {
                arrears: arrearsVal,
                rows: dataArray
            };
            saveToLocalStorage();
        }

        function renderActiveLedgerRows() {
            ledgerContainer.innerHTML = '';
            const targetLedger = masterKhataData.ledgers[masterKhataData.activeLedger];
            arrearsInput.value = targetLedger ? (targetLedger.arrears || 0) : 0;
            const activeRows = targetLedger ? (targetLedger.rows || []) : [];

            if (activeRows.length === 0) { addNewRow('', null, 'EXPENSE', false); } 
            else { activeRows.forEach(item => addNewRow(item.textVal, item.isoDate, item.type || 'EXPENSE', false)); }
            
            handleLedgerInputSync();
        }

        function addNewSalaryExpenseRow(initialValue = '', savedIsoDate = null, transactionType = 'EXPENSE', focusTarget = false) {
            const finalIsoDate = savedIsoDate || getRawIsoDateString();
            const rowDiv = document.createElement('div');
            rowDiv.className = 'swipe-item flex flex-col bg-white dark:bg-slate-900 px-3 py-1.5 smooth-transition focus-within:bg-slate-50/70 dark:focus-within:bg-slate-800/30 relative';
            rowDiv.dataset.type = transactionType;

            const activeColorClass = transactionType === 'INCOME' ? 'bg-fuchsia-500 text-white' : 'bg-slate-200 dark:bg-slate-800 text-slate-600 dark:text-slate-400';
            
            rowDiv.innerHTML = `
                <div class="flex items-center gap-2 w-full">
                    <button onclick="toggleTransactionRowType(this)" class="tx-toggle-btn text-[9px] font-black tracking-wider px-1 py-0.5 rounded uppercase shrink-0 transition ${activeColorClass}">${transactionType}</button>
                    <div class="relative bg-slate-50 dark:bg-slate-950 rounded px-1.5 py-0.5 text-center min-w-[58px] max-w-[58px] overflow-hidden shrink-0 border border-slate-100 dark:border-slate-800/80">
                        <input type="date" value="${finalIsoDate}" class="sal-date-picker absolute inset-0 opacity-0 cursor-pointer w-full h-full" onchange="updateUiDateDisplay(this)" />
                        <span class="date-label text-[9px] font-bold text-slate-500 dark:text-slate-400 tracking-tight block pointer-events-none">${formatIsoToBadgeText(finalIsoDate)}</span>
                    </div>
                    <input type="text" value="${initialValue}" class="salary-expense-input flex-1 bg-transparent text-sm font-semibold text-slate-800 dark:text-slate-200 placeholder-slate-300 dark:placeholder-slate-600 py-0.5" placeholder="Rent 25000 + bills 4000" autocomplete="off" autocorrect="off" autocapitalize="off" />
                    <div class="badge-holder-zone flex items-center gap-1 shrink-0 select-none"></div>
                </div>
            `;

            salaryExpensesContainer.appendChild(rowDiv);
            attachTouchSwipeGestures(rowDiv);
            const inputElement = rowDiv.querySelector('.salary-expense-input');
            
            updateInlineRowEvaluationBadge(inputElement, parseEvaluatedExpressionValue(initialValue));

            inputElement.addEventListener('input', function() {
                updateInlineRowEvaluationBadge(this, parseEvaluatedExpressionValue(this.value));
                handleSalaryInputSync();
            });
            
            inputElement.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const nextInput = addNewSalaryExpenseRow('', null, 'EXPENSE', true);
                    nextInput.focus();
                }
            });

            if (focusTarget) {
                setTimeout(() => {
                    inputElement.focus();
                    rowDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }, 40);
            }
            return inputElement;
        }

        function handleSalaryInputSync() {
            let totalDeductions = 0;
            const rows = salaryExpensesContainer.querySelectorAll(':scope > div');
            const expArray = [];

            rows.forEach(row => {
                const dateVal = row.querySelector('.sal-date-picker').value;
                const textVal = row.querySelector('.salary-expense-input').value;
                const type = row.dataset.type || 'EXPENSE';
                const rowAmt = parseEvaluatedExpressionValue(textVal);

                if(type === 'INCOME') totalDeductions -= rowAmt;
                else totalDeductions += rowAmt;

                if (textVal.trim() !== '') {
                    expArray.push({ isoDate: dateVal, textVal, type });
                }
            });

            const baseIncome = parseFloat(salaryBaseIncomeInput.value) || 0;
            salaryRemainingDisplay.innerText = (baseIncome - totalDeductions).toLocaleString('en-US');

            masterKhataData.salaryTracker.months[masterKhataData.salaryTracker.activeMonth] = {
                income: baseIncome,
                expenses: expArray
            };
            saveToLocalStorage();
        }

        function renderActiveSalaryMonthRows() {
            salaryExpensesContainer.innerHTML = '';
            const targetMonth = masterKhataData.salaryTracker.months[masterKhataData.salaryTracker.activeMonth];
            salaryBaseIncomeInput.value = targetMonth ? (targetMonth.income || 0) : 0;
            const activeExp = targetMonth ? (targetMonth.expenses || []) : [];

            if (activeExp.length === 0) { addNewSalaryExpenseRow('', null, 'EXPENSE', false); } 
            else { activeExp.forEach(item => addNewSalaryExpenseRow(item.textVal, item.isoDate, item.type || 'EXPENSE', false)); }
            
            handleSalaryInputSync();
        }

        function updateLedgerDropdownUI() {
            ledgerSelector.innerHTML = '';
            Object.keys(masterKhataData.ledgers).forEach(name => {
                const opt = document.createElement('option');
                opt.value = name; opt.innerText = name;
                opt.selected = (name === masterKhataData.activeLedger);
                ledgerSelector.appendChild(opt);
            });
            ledgerTitleDisplay.innerText = `Book: ${masterKhataData.activeLedger}`;
        }

        function createNewLedger() {
            const name = prompt("Name your new Ledger Book:");
            if (!name || name.trim() === "") return;
            const cleaned = name.trim();
            if (masterKhataData.ledgers[cleaned]) { alert("Book profile already mapped."); return; }
            
            masterKhataData.ledgers[cleaned] = { arrears: 0, rows: [] };
            masterKhataData.activeLedger = cleaned;
            updateLedgerDropdownUI();
            renderActiveLedgerRows();
            saveToLocalStorage();
        }

        function switchLedger() {
            masterKhataData.activeLedger = ledgerSelector.value;
            updateLedgerDropdownUI();
            renderActiveLedgerRows();
            saveToLocalStorage();
        }

        function deleteCurrentLedger() {
            const current = masterKhataData.activeLedger;
            if (Object.keys(masterKhataData.ledgers).length <= 1) { alert("You must retain at least one book profile."); return; }
            if (confirm(`Permanently remove "${current}"?`)) {
                delete masterKhataData.ledgers[current];
                masterKhataData.activeLedger = Object.keys(masterKhataData.ledgers)[0];
                updateLedgerDropdownUI();
                renderActiveLedgerRows();
                saveToLocalStorage();
            }
        }

        function updateSalaryMonthsDropdownUI() {
            salaryMonthSelector.innerHTML = '';
            Object.keys(masterKhataData.salaryTracker.months).forEach(mName => {
                const opt = document.createElement('option');
                opt.value = mName; opt.innerText = mName;
                opt.selected = (mName === masterKhataData.salaryTracker.activeMonth);
                salaryMonthSelector.appendChild(opt);
            });
        }

        function createNewSalaryMonth() {
            const name = prompt("Enter cycle timeframe (e.g. June 2026):");
            if (!name || name.trim() === "") return;
            const cleaned = name.trim();
            if (masterKhataData.salaryTracker.months[cleaned]) { alert("Timeframe profile mapping already exists."); return; }
            
            const standardVal = parseFloat(salaryBaseIncomeInput.value) || 0;
            masterKhataData.salaryTracker.months[cleaned] = { income: standardVal, expenses: [] };
            masterKhataData.salaryTracker.activeMonth = cleaned;
            updateSalaryMonthsDropdownUI();
            renderActiveSalaryMonthRows();
            saveToLocalStorage();
        }

        function switchSalaryMonth() {
            masterKhataData.salaryTracker.activeMonth = salaryMonthSelector.value;
            renderActiveSalaryMonthRows();
            saveToLocalStorage();
        }

        function shareReceiptNative() {
            let title = activeTab === 'accounts' ? masterKhataData.activeLedger : `Salary Cycle: ${masterKhataData.salaryTracker.activeMonth}`;
            let rowsToRender = [];
            let totalSummaryText = "";

            if (activeTab === 'accounts') {
                const target = masterKhataData.ledgers[masterKhataData.activeLedger];
                const arrears = target ? (target.arrears || 0) : 0;
                let runningSum = 0;
                
                document.querySelectorAll('.ledger-input').forEach((inp) => {
                    if(inp.value.trim() === "") return;
                    const val = parseEvaluatedExpressionValue(inp.value);
                    const type = inp.parentElement.parentElement.dataset.type || 'EXPENSE';
                    runningSum += (type === 'INCOME' ? -val : val);
                    rowsToRender.push(`- [${type}] ${inp.value.trim()} -> Rs. ${val}`);
                });
                totalSummaryText = `Arrears Balance: Rs. ${arrears}\nNet Total Balance: Rs. ${runningSum + arrears}`;
            } else {
                const income = parseFloat(salaryBaseIncomeInput.value) || 0;
                let totalSpent = 0;

                document.querySelectorAll('.salary-expense-input').forEach((inp) => {
                    if(inp.value.trim() === "") return;
                    const val = parseEvaluatedExpressionValue(inp.value);
                    const type = inp.parentElement.parentElement.dataset.type || 'EXPENSE';
                    totalSpent += (type === 'INCOME' ? -val : val);
                    rowsToRender.push(`- [${type}] ${inp.value.trim()} -> Rs. ${val}`);
                });
                totalSummaryText = `Base Income: Rs. ${income}\nWallet Remaining: Rs. ${income - totalSpent}`;
            }

            if(rowsToRender.length === 0) {
                alert("Cannot share statement for an empty ledger timeline.");
                return;
            }

            const formattedMessage = `📊 *DIGITAL TRANSACTION RECEIPT*\n_Book: ${title}_\n\n*Line Entries:*\n${rowsToRender.join('\n')}\n\n*Summary Financials:*\n${totalSummaryText}\n\n_Generated via Ezza Ledger Pro_`;

            if (navigator.share) {
                navigator.share({ title: `Receipt - ${title}`, text: formattedMessage }).catch(() => { fallbackClipboardShare(formattedMessage); });
            } else {
                fallbackClipboardShare(formattedMessage);
            }
        }

        function fallbackClipboardShare(textToCopy) {
            navigator.clipboard.writeText(textToCopy).then(() => {
                alert("Receipt copied to Clipboard! You can now paste it directly into WhatsApp.");
            }).catch(() => {
                alert("Sharing unavailable. Copy your screenshot to proceed manually.");
            });
        }

        function copyRawBackupStringToClipboard() {
            const rawStr = JSON.stringify(masterKhataData);
            navigator.clipboard.writeText(rawStr).then(() => {
                alert("Complete application state code copied to clipboard! Save this snippet to back up or restore your data.");
            }).catch(() => {
                alert("Unable to write data string to clipboard.");
            });
        }

        function saveToLocalStorage() {
            localStorage.setItem('ezza_app_ultra_v6', JSON.stringify(masterKhataData));
        }

        function clearActiveTabRows() {
            if (!confirm('Clear all entries from this current view tab?')) return;
            if (activeTab === 'accounts') {
                ledgerContainer.innerHTML = '';
                arrearsInput.value = 0;
                addNewRow('', null, 'EXPENSE', true);
                handleLedgerInputSync();
            } else {
                salaryExpensesContainer.innerHTML = '';
                addNewSalaryExpenseRow('', null, 'EXPENSE', true);
                handleSalaryInputSync();
            }
        }

        function exportBackup() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(masterKhataData));
            const dlAnchor = document.createElement('a');
            dlAnchor.setAttribute("href", dataStr);
            dlAnchor.setAttribute("download", `ledger_ultra_backup.json`);
            document.body.appendChild(dlAnchor);
            dlAnchor.click();
            dlAnchor.remove();
        }

        function importBackup(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const parsed = JSON.parse(e.target.result);
                    if (parsed.ledgers && parsed.salaryTracker) {
                        masterKhataData = parsed;
                        saveToLocalStorage();
                        updateLedgerDropdownUI();
                        updateSalaryMonthsDropdownUI();
                        activeTab === 'accounts' ? renderActiveLedgerRows() : renderActiveSalaryMonthRows();
                    } else { alert("File verification signature mismatch."); }
                } catch (err) { alert('Invalid file schema processing.'); }
            };
            reader.readAsText(file);
        }

        window.onload = function() {
            initThemeEngine();
            const cachedStore = localStorage.getItem('ezza_app_ultra_v6');
            if (cachedStore) {
                try {
                    const parsed = JSON.parse(cachedStore);
                    if (parsed.ledgers) masterKhataData = parsed;
                } catch(e) {}
            }
            updateLedgerDropdownUI();
            updateSalaryMonthsDropdownUI();
            renderActiveLedgerRows();
        };
    </script>
</body>
</html>
